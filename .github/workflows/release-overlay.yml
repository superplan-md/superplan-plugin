name: Release Overlay Assets

on:
  push:
    tags:
      - 'alpha.*'

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
            exit 0
          fi
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --target "${GITHUB_SHA}" \
            --generate-notes

  build_overlay_assets:
    needs: create_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset_glob: dist/release/overlay/superplan-overlay-darwin-*.tar.gz
          - os: ubuntu-24.04
            asset_glob: dist/release/overlay/superplan-overlay-linux-*.AppImage
          - os: windows-latest
            asset_glob: dist/release/overlay/superplan-overlay-windows-*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/overlay-desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install workspace dependencies
        run: npm ci

      - name: Install overlay app dependencies
        working-directory: apps/overlay-desktop
        run: npm ci

      - name: Build and package overlay release asset
        run: npm run overlay:release

      - name: Upload overlay asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_GLOB: ${{ matrix.asset_glob }}
        shell: bash
        run: |
          shopt -s nullglob
          assets=( $ASSET_GLOB )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No assets matched ${ASSET_GLOB}" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
